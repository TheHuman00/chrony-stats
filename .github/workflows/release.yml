name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.1)'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate version format
        run: |
          if ! echo "${{ github.event.inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "Invalid version format. Expected x.y.z"
            exit 1
          fi

      - name: Bump VERSION in script
        run: |
          sed -i 's/^VERSION=".*"/VERSION="${{ github.event.inputs.version }}"/' chrony-network-stats.sh
          grep '^VERSION=' chrony-network-stats.sh

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add chrony-network-stats.sh
          git commit -m "chore: release v${{ github.event.inputs.version }}"
          git tag "v${{ github.event.inputs.version }}"
          git push origin HEAD --tags

      - name: Extract release notes from changelog
        run: |
          VERSION="${{ github.event.inputs.version }}"
          awk -v version="v${VERSION}" '
            $0 ~ "^## " version "([[:space:]-]|$)" { found=1; print; next }
            found && /^## / { exit }
            found { print }
          ' CHANGELOG.md > RELEASE_NOTES.md

          if [ ! -s RELEASE_NOTES.md ]; then
            echo "No changelog entry found for v${VERSION}"
            echo "Add a '## v${VERSION}' section to CHANGELOG.md before running the release."
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "v${{ github.event.inputs.version }}"
          name: "v${{ github.event.inputs.version }}"
          generate_release_notes: false
          body_path: RELEASE_NOTES.md
          files: |
            chrony-network-stats.sh
            chrony-network-stats.conf
